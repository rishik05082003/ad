<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Adil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Impact, sans-serif; }
    h1 { color: #fff; font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 1.5rem; }
    .video-wrap { position: relative; max-width: 90vw; }
    video { max-width: 90vw; max-height: 75vh; border-radius: 12px 12px 0 0; display: block; }
    .reveal-overlay { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px 12px 0 0; }
    .reveal-overlay span { color: #fff; font-size: 1.8rem; letter-spacing: 3px; }
    .speed-badge { position: absolute; top: 12px; right: 12px; background: #ff0055; color: #fff; font-size: 1rem; padding: 4px 10px; border-radius: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .speed-badge.show { opacity: 1; }
    .fake-controls { background: #1c1c1c; border-radius: 0 0 12px 12px; padding: 8px 14px; display: flex; align-items: center; justify-content: center; }
    .mute-btn { background: none; border: none; cursor: pointer; color: #aaa; font-family: sans-serif; font-size: 0.85rem; letter-spacing: 1px; }
    .credit { color: #555; font-size: 0.8rem; margin-top: 1rem; font-family: sans-serif; }
    .credit span { color: #fff; }
  </style>
</head>
<body>
  <h1>HAPPY BIRTHDAY ADIL</h1>
  <div class="video-wrap">
    <video id="vid" src="video.mp4" loop playsinline></video>
    <div class="reveal-overlay" id="overlay">
      <span>Click to reveal</span>
    </div>
    <div class="speed-badge" id="badge"></div>
    <div class="fake-controls">
      <button class="mute-btn" id="muteBtn">Mute this video</button>
    </div>
  </div>
  <p class="credit">by <span>Rishi Kohli, the GOAT</span></p>

  <script>
    const vid = document.getElementById('vid');
    const badge = document.getElementById('badge');
    const overlay = document.getElementById('overlay');
    let badgeTimer;

    overlay.addEventListener('click', () => {
      vid.muted = false;
      vid.play();
      overlay.style.display = 'none';
    });

    function speedUp() {
      vid.playbackRate = Math.min(parseFloat((vid.playbackRate + 0.3).toFixed(1)), 16);
      badge.textContent = vid.playbackRate.toFixed(1) + 'x';
      badge.classList.add('show');
      clearTimeout(badgeTimer);
      badgeTimer = setTimeout(() => badge.classList.remove('show'), 1200);
    }

    document.getElementById('muteBtn').addEventListener('click', speedUp);
  </script>
</body>
</html>
